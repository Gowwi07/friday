services:
  - type: web
    name: friday-backend
    runtime: docker
    plan: free
    region: singapore
    branch: main
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: TZ
        value: Asia/Kolkata
      - key: GEMINI_API_KEY
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      - key: MY_WHATSAPP_NUMBER
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: CRON_SECRET
        sync: false
