services:
  - type: web
    name: friday-backend
    runtime: docker
    plan: free
    region: singapore
    branch: main
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: TZ
        value: Asia/Kolkata
      # Wake-up / morning brief time (24h IST)
      - key: WAKE_UP_HOUR
        value: "7"
      - key: WAKE_UP_MINUTE
        value: "0"
      # Night summary time (24h IST)
      - key: NIGHT_SUMMARY_HOUR
        value: "22"
      - key: NIGHT_SUMMARY_MINUTE
        value: "0"
      # Your first name for greetings e.g. "Good morning, Peter!"
      - key: USER_NAME
        value: ""
      # Secrets — set these in Render dashboard, not here
      - key: GEMINI_API_KEY
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      - key: MY_WHATSAPP_NUMBER
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: CRON_SECRET
        sync: false
      # Fallback LLM APIs
      - key: FALLBACK_API_KEYS
        value: "sk-jAnj6nCkKIeP88wLm2b8dSz3jgv2oGRSuX6MQriJpZC45Qyu,sk-B8ZObuRLKy0KZ3END5Gso7uOTD6IoAdVBbLH3Zl5rU5w5WqL,sk-7RlPueIsQY4eSfC6AgtSON6OZ8PAIOEnHKsNNBO6s9bIt1Ya,sk-x0MhUOOGSqDMnGsPJcuAljIDxM6XOdjylgDPfKiC8AoHxtf6,sk-10p8ZI2fyeuhP7WFDGf9zbe9UenLQneyF18HT6ctjlN2jFqn,sk-pikPeGyScDDgPgeiwvpCmRXl978HwsW7bm0c4iSDRXmJC2Nc"
      - key: FALLBACK_BASE_URL
        value: "https://aiapiv2.pekpik.com/v1"
      - key: FALLBACK_MODEL
        value: "gemini-2.5-flash"
