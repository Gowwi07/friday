name: Keep FRIDAY awake and run reminders

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  maintenance:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Wake service and process scheduled work
        env:
          FRIDAY_URL: ${{ secrets.FRIDAY_RENDER_URL }}
          CRON_SECRET: ${{ secrets.FRIDAY_CRON_SECRET }}
        run: |
          test -n "$FRIDAY_URL"
          test -n "$CRON_SECRET"
          curl --fail --show-error --silent \
            --retry 3 --retry-delay 20 --max-time 90 \
            -X POST -H "X-Cron-Secret: $CRON_SECRET" \
            "$FRIDAY_URL/maintenance"
